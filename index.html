<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Debug SharePoint Flow</title>
<style>
body { font-family: Arial; padding: 20px; }
pre { background: #f4f4f4; padding: 15px; border-radius: 5px; }
.error { color: red; font-weight: bold; }
</style>
</head>

<body>

<h2>Тест на връзка със SharePoint</h2>

<div id="result">Зареждане...</div>

<script>

console.log("VERSION 2 LOADED ✅");

// 🔴 СМЕНИ ТУК С РЕАЛНИЯ FLOW URL
const FLOW_READ = "PASTE_REAL_FLOW_URL_HERE";

let spData = [];

async function loadFromSharePoint() {

  console.log("START FETCH →", FLOW_READ);

  try {
    const res = await fetch(FLOW_READ, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({})
    });

    console.log("STATUS:", res.status);

    const text = await res.text();

    console.log("RAW RESPONSE:", text);

    // ❗ Ако не е JSON → покажи директно
    if (text.trim().startsWith("<")) {
      document.getElementById("result").innerHTML =
        "<div class='error'>Flow връща HTML (грешка):<br><pre>" + text + "</pre></div>";
      return;
    }

    const data = JSON.parse(text);

    console.log("PARSED:", data);

    // 🔥 универсален parser
    if (Array.isArray(data)) {
      spData = data;
    } else if (Array.isArray(data.value)) {
      spData = data.value;
    } else if (Array.isArray(data.body)) {
      spData = data.body;
    } else if (data.body && Array.isArray(data.body.value)) {
      spData = data.body.value;
    } else {
      spData = [];
    }

    console.log("FINAL spData:", spData);

    document.getElementById("result").innerHTML =
      "<h3>Резултат:</h3><pre>" + JSON.stringify(spData, null, 2) + "</pre>";

  } catch (e) {
    console.error("ERROR:", e);
    document.getElementById("result").innerHTML =
      "<div class='error'>Грешка: " + e.message + "</div>";
  }
}

loadFromSharePoint();

</script>

</body>
</html>
