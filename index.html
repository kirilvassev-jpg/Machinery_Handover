<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Machinery</title>
</head>
<body>

<h2>Тест на връзка със SharePoint</h2>

<div id="result">Зареждане...</div>

<script>

console.log("VERSION 2 LOADED ✅");

const FLOW_READ = "PASTE_YOUR_FLOW_URL_HERE";

let spData = [];

async function loadFromSharePoint() {

  console.log("START FETCH...");

  try {
    const res = await fetch(FLOW_READ, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({})
    });

    const text = await res.text();

    console.log("RAW RESPONSE:", text);

    const data = JSON.parse(text);

    console.log("PARSED:", data);

    // 🔥 универсален parser
    if (Array.isArray(data)) {
      spData = data;
    } else if (Array.isArray(data.value)) {
      spData = data.value;
    } else if (Array.isArray(data.body)) {
      spData = data.body;
    } else if (data.body && Array.isArray(data.body.value)) {
      spData = data.body.value;
    } else {
      spData = [];
    }

    console.log("FINAL spData:", spData);

    document.getElementById("result").innerHTML =
      "<pre>" + JSON.stringify(spData, null, 2) + "</pre>";

  } catch (e) {
    console.error("ERROR:", e);
    document.getElementById("result").innerHTML = "Грешка: " + e.message;
  }
}

loadFromSharePoint();

</script>

</body>
</html>
